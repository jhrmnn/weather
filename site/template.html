<!DOCTYPE html>
<html lang="__LANG__">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>__TITLE__</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      line-height: 1.55;
      color: #1b1b1b;
      background: #f5f6f8;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #e6e6e6; background: #14161a; }
      .card { background: #1e2127 !important; box-shadow: none !important; }
      a { color: #6fb3ff; }
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 2rem 1.25rem 3rem; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem; margin-bottom: .5rem;
    }
    .city-select {
      display: inline-flex; align-items: center; gap: .4rem; font-size: .9rem;
    }
    .city-select .city-label { color: #6a7077; }
    .city-select select {
      font: inherit; font-weight: 700; color: inherit;
      background: #fff; border: 1px solid #c8ccd2; border-radius: 8px;
      padding: .3rem 1.6rem .3rem .6rem; cursor: pointer; appearance: none;
      background-image:
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 8"><path fill="%236a7077" d="M1 1l5 5 5-5"/></svg>');
      background-repeat: no-repeat;
      background-position: right .55rem center; background-size: .65rem;
    }
    @media (prefers-color-scheme: dark) {
      .city-select select {
        background-color: #1e2127; border-color: #3a3f47;
      }
    }
    .lang { font-size: .9rem; }
    .lang a { color: #6a7077; text-decoration: none; }
    .lang a:hover { text-decoration: underline; }
    .lang [aria-current="page"] { font-weight: 700; color: inherit; }
    .lang .sep { color: #b3b8be; margin: 0 .15rem; }
    header h1 { font-size: 1.6rem; margin: 0 0 .25rem; }
    header p { margin: 0; color: #6a7077; }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.06);
      padding: 1rem;
      margin: 1.5rem 0;
    }
    .card img { width: 100%; height: auto; display: block; border-radius: 6px; }
    .meta {
      display: flex; flex-wrap: wrap; gap: .5rem 1.5rem;
      font-size: .9rem; color: #6a7077; margin-top: .75rem;
    }
    footer { font-size: .85rem; color: #6a7077; margin-top: 2rem; }
    footer a { color: inherit; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <label class="city-select">
        <span class="city-label">__LABEL_CITY__</span>
        <select id="city" aria-label="__LABEL_CITY__">__CITY_OPTIONS__</select>
      </label>
      <nav class="lang">__LANG_NAV__</nav>
    </div>
    <header>
      <h1>__H1__</h1>
      <p><span id="city-sub">__CITY_SUB__</span> · __SUBTITLE_TAIL__</p>
    </header>

    <div class="card">
      <img id="meteogram-img" src="__METEO_SRC__" alt="__ALT_METEO__">
      <div class="meta">
        <span>__LABEL_UPDATED__ <strong>__UPDATED__</strong></span>
        <span>__LABEL_REFRESH__</span>
      </div>
    </div>

    <div class="card">
      <img id="evolution-img" src="__EVO_SRC__" alt="__ALT_EVO__">
      <div class="meta">
        <span>__CAPTION_EVO__</span>
      </div>
    </div>

    <footer>
      <p>__FOOTER__</p>
    </footer>
  </div>

  <script>
    // Top-level city selector: swap the figures (and the subtitle's city part)
    // in place when a different city is chosen — no page reload. The non-default
    // selection is reflected in the URL (?city=<slug>) so it can be shared and
    // bookmarked, mirrored to localStorage, and carried onto the language link
    // so it survives the language switch.
    (function () {
      var CITIES = __CITY_DATA__;
      var DEFAULT = "__DEFAULT_CITY__";
      var PARAM = "city";
      var STORE_KEY = "weather-city";
      var select = document.getElementById("city");
      var meteoImg = document.getElementById("meteogram-img");
      var evoImg = document.getElementById("evolution-img");
      var citySub = document.getElementById("city-sub");

      // Reflect the selection in the URL: a query param for non-default cities,
      // and a clean URL (no param) for the default.
      function syncUrl(slug) {
        var url = new URL(window.location.href);
        if (slug === DEFAULT) {
          url.searchParams.delete(PARAM);
        } else {
          url.searchParams.set(PARAM, slug);
        }
        history.replaceState(null, "", url.toString());
      }

      // Carry the selection onto the language switcher link so it survives the
      // page navigation even without localStorage.
      function syncLangLinks(slug) {
        var links = document.querySelectorAll(".lang a[href]");
        for (var i = 0; i < links.length; i++) {
          // Keep the original relative target (``./`` for the default
          // language, ``<lang>.html`` otherwise) so the clean directory URL is
          // preserved, and only attach the city query param.
          var base = links[i].getAttribute("href").split("?")[0];
          links[i].setAttribute(
            "href",
            slug === DEFAULT
              ? base
              : base + "?" + PARAM + "=" + encodeURIComponent(slug));
        }
      }

      function apply(slug) {
        var c = CITIES[slug];
        if (!c) return;
        meteoImg.src = c.meteo;
        evoImg.src = c.evo;
        citySub.textContent = c.sub;
        select.value = slug;
        try { localStorage.setItem(STORE_KEY, slug); } catch (e) {}
        syncUrl(slug);
        syncLangLinks(slug);
      }

      // Initial city: an explicit URL param wins (shareable links), then the
      // remembered choice, then the default.
      var fromUrl = new URLSearchParams(window.location.search).get(PARAM);
      var stored;
      try { stored = localStorage.getItem(STORE_KEY); } catch (e) {}
      var initial = (fromUrl && CITIES[fromUrl]) ? fromUrl
                  : (stored && CITIES[stored]) ? stored
                  : DEFAULT;
      apply(initial);

      select.addEventListener("change", function () {
        apply(select.value);
      });
    })();
  </script>
</body>
</html>
