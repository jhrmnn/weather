name: Collect raw forecast data

on:
  schedule:
    # Every six hours, offset from the site build. ECMWF IFS ENS runs at
    # 00/12 UTC; the dedup key means extra runs are cheap no-ops.
    - cron: "30 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Never let two collectors push to the data branch at once.
concurrency:
  group: data-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect into the data branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Materialise the data branch in ./data-store, creating it as an
          # orphan branch on the very first run.
          mkdir data-store
          (
            cd data-store
            git init -q
            git remote add origin "$remote"
            if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
              git fetch -q --depth=1 origin data
              git checkout -q -b data FETCH_HEAD
            else
              echo "data branch does not exist yet; creating it."
              git checkout -q --orphan data
            fi
          )

          # Fetch + archive any new raw responses (dedup handled in the script).
          python data/collect.py --data-dir data-store

          cd data-store
          git add -A
          if git diff --cached --quiet; then
            echo "No new data; nothing to commit."
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -q -m "data: archive new raw forecast snapshots ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push -q origin HEAD:data
          echo "Pushed new data to the data branch."
