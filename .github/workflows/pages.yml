name: Build and deploy meteogram site

on:
  schedule:
    # Every three hours, on the hour (UTC).
    - cron: "0 */3 * * *"
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Fetch fresh raw data into the data branch, but only if what's already
  # stored there is older than an hour. The data branch is an orphan archive
  # kept off main; a commit is pushed only when there is genuinely new data.
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Serialise data-branch writes across overlapping workflow runs.
    concurrency:
      group: data-collect
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch new data if the latest is over an hour old
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Forked PRs get a read-only token, so they can't push the archive.
          CAN_PUSH: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          set -euo pipefail
          remote="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Materialise the data branch in ./data-store, creating it as an
          # orphan branch on the very first run.
          mkdir data-store
          (
            cd data-store
            git init -q
            git remote add origin "$remote"
            if git ls-remote --exit-code --heads origin data >/dev/null 2>&1; then
              git fetch -q --depth=1 origin data
              git checkout -q -b data FETCH_HEAD
            else
              echo "data branch does not exist yet; creating it."
              git checkout -q --orphan data
            fi
          )

          # Skip fetching if the latest stored data (the data branch's last
          # commit) is under an hour old.
          last=$(git -C data-store log -1 --format=%ct 2>/dev/null || echo 0)
          age=$(( $(date -u +%s) - last ))
          if [ "$last" -ne 0 ] && [ "$age" -lt 3600 ]; then
            echo "Latest data is ${age}s old (< 1h); skipping fetch."
            exit 0
          fi
          echo "Latest data is ${age}s old; fetching."

          python data/collect.py --data-dir data-store

          cd data-store
          git add -A
          if git diff --cached --quiet; then
            echo "No new data; nothing to commit."
            exit 0
          fi
          if [ "$CAN_PUSH" != "true" ]; then
            echo "Read-only token (forked PR); skipping push of new data."
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -q -m "data: archive new raw forecast snapshots ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push -q origin HEAD:data
          echo "Pushed new data to the data branch."

  # Build the static site from the latest archived data; both deploy jobs
  # consume the artifacts. No live fetching happens here.
  build:
    needs: fetch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # The data branch always exists by now (the fetch job creates it).
      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data-store

      - name: Build site
        run: python site/build.py --output-dir _site --data-dir data-store

      # Tarball in the format actions/deploy-pages expects (for GitHub Pages).
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # Plain copy of the files for the Cloudflare deploy.
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site

  # Publish to GitHub Pages on the production triggers: push to main, schedule,
  # and manual dispatch.
  deploy-pages:
    needs: build
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    # Only one Pages deployment at a time; let a running one finish.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Publish a per-PR branch (preview) deployment to Cloudflare Pages.
  deploy-cloudflare:
    needs: build
    # Secrets aren't exposed to forked-PR runs, so skip them to avoid a
    # guaranteed failure. Same-repo branch PRs deploy as normal.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    # Cancel superseded runs for the same PR so the latest push wins.
    concurrency:
      group: preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site

      - name: Deploy to Cloudflare Pages (branch deployment)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy _site
            --project-name=jhrmnn-weather
            --branch=${{ github.head_ref }}

      - name: Comment preview URL on the PR
        uses: actions/github-script@v7
        with:
          script: |
            // Prefer the stable per-branch alias; fall back to the per-deploy URL.
            const alias = "${{ steps.deploy.outputs.pages-deployment-alias-url }}";
            const deployment = "${{ steps.deploy.outputs.deployment-url }}";
            const primary = alias || deployment;
            if (!primary) return;
            const marker = "<!-- cloudflare-preview -->";
            let body = `${marker}\n🌥️ **Cloudflare Pages preview** for ` +
              `\`${{ github.head_ref }}\`:\n\n${primary}`;
            if (alias && deployment && alias !== deployment) {
              body += `\n\n<sub>This deploy: ${deployment}</sub>`;
            }
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
