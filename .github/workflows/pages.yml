name: Build and deploy meteogram site

on:
  schedule:
    # Every hour, on the hour (UTC).
    - cron: "0 * * * *"
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Decide whether to fetch this run, throttling to at most one fetch every 50
  # minutes. We walk this workflow's prior runs newest-first and fetch only when
  # the most recent run whose fetch job actually ran (conclusion success/failure
  # — not the 'skipped' of a throttled run or a forked PR) started over 50
  # minutes ago. So a burst of triggers (e.g. many pushes to a PR) fetches at
  # most once every 50 minutes, and a long burst of skipped runs can't keep
  # deferring the next fetch. The run
  # history is GitHub's own, so the gate needs no committed or cached state.
  # Manual dispatch always fetches.
  gate:
    runs-on: ubuntu-latest
    permissions:
      actions: read  # list this workflow's prior runs and their jobs
    outputs:
      fetch: ${{ steps.gate.outputs.fetch }}
    steps:
      - name: Decide whether to fetch
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.info('Manual dispatch: fetching.');
              core.setOutput('fetch', 'true');
              return;
            }
            const GATE_MS = 50 * 60 * 1000;
            const now = Date.now();
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages.yml',
              per_page: 30,
            });
            const prior = data.workflow_runs
              .filter((r) => r.id !== context.runId && r.run_started_at &&
                Date.parse(r.run_started_at) < now)
              .sort((a, b) =>
                Date.parse(b.run_started_at) - Date.parse(a.run_started_at));
            let lastFetch = null;
            for (const run of prior) {
              const { data: jobsData } =
                await github.rest.actions.listJobsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                });
              const job = jobsData.jobs.find((j) => j.name === 'fetch');
              // 'success'/'failure' = the fetch job ran; 'skipped' = throttled
              // (or a forked PR), so it doesn't count as a fetch.
              if (job && (job.conclusion === 'success' ||
                          job.conclusion === 'failure')) {
                lastFetch = Date.parse(run.run_started_at);
                break;
              }
            }
            const should = !lastFetch || (now - lastFetch) >= GATE_MS;
            core.info(lastFetch
              ? `Last fetch started ${Math.round((now - lastFetch) / 60000)} min ago; fetch=${should}.`
              : 'No prior fetch found; fetch=true.');
            core.setOutput('fetch', should ? 'true' : 'false');

  # Fetch the latest model run into the data branch when the gate allows it. A
  # commit is pushed only when the forecast content is genuinely new. Skipped on
  # forked PRs, whose read-only token can't push.
  fetch:
    needs: gate
    if: >-
      needs.gate.outputs.fetch == 'true' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Serialise data-branch writes across overlapping workflow runs.
    concurrency:
      group: data-collect
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data-store

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch the latest run if it isn't already archived
        run: |
          set -euo pipefail

          # collect.py downloads the ensemble and archives a forecast only when
          # its content is new, so a commit appears only when data changes.
          python data/collect.py --data-dir data-store

          cd data-store
          git add -A
          if git diff --cached --quiet; then
            echo "No new data; nothing to commit."
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -q -m "data: archive new raw forecast snapshots ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push origin HEAD:data
          echo "Pushed new data to the data branch."


  # Build the static site from the latest archived data; both deploy jobs
  # consume the artifacts. No live fetching happens here. Runs whenever the fetch
  # job didn't fail — i.e. it fetched or was throttled (skipped) — so the site
  # still rebuilds and deploys on the (most) runs that don't fetch.
  build:
    needs: fetch
    if: ${{ !cancelled() && needs.fetch.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data-store

      - name: Build site
        run: python site/build.py --output-dir _site --data-dir data-store

      # Tarball in the format actions/deploy-pages expects (for GitHub Pages).
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # Plain copy of the files for the Cloudflare deploy.
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site

  # Publish to GitHub Pages on the production triggers: push to main, schedule,
  # and manual dispatch. The `!cancelled() && needs.build.result == 'success'`
  # guard is required because most runs throttle (skip) the fetch job, and a
  # skipped job's skip propagates down the needs chain to dependents whose `if:`
  # lacks a status-check function — without it this deploy would skip whenever
  # fetch was throttled, even though build succeeded.
  deploy-pages:
    needs: build
    if: >-
      !cancelled() && needs.build.result == 'success' &&
      (github.event_name == 'push' ||
       github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    # Only one Pages deployment at a time; let a running one finish.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Publish a per-PR branch (preview) deployment to Cloudflare Pages.
  deploy-cloudflare:
    needs: build
    # Secrets aren't exposed to forked-PR runs, so skip them to avoid a
    # guaranteed failure. Same-repo branch PRs deploy as normal. The
    # `!cancelled() && needs.build.result == 'success'` guard keeps a throttled
    # (skipped) fetch from propagating its skip down to this preview deploy.
    if: >-
      !cancelled() && needs.build.result == 'success' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    # Cancel superseded runs for the same PR so the latest push wins.
    concurrency:
      group: preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site

      - name: Deploy to Cloudflare Pages (branch deployment)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy _site
            --project-name=jhrmnn-weather
            --branch=${{ github.head_ref }}

      - name: Comment preview URL on the PR
        uses: actions/github-script@v7
        with:
          script: |
            // Prefer the stable per-branch alias; fall back to the per-deploy URL.
            const alias = "${{ steps.deploy.outputs.pages-deployment-alias-url }}";
            const deployment = "${{ steps.deploy.outputs.deployment-url }}";
            const primary = alias || deployment;
            if (!primary) return;
            const marker = "<!-- cloudflare-preview -->";
            let body = `${marker}\n🌥️ **Cloudflare Pages preview** for ` +
              `\`${{ github.head_ref }}\`:\n\n${primary}`;
            if (alias && deployment && alias !== deployment) {
              body += `\n\n<sub>This deploy: ${deployment}</sub>`;
            }
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
