name: Build and deploy meteogram site

on:
  schedule:
    # Every three hours, on the hour (UTC).
    - cron: "0 */3 * * *"
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Fetch the latest model run into the data branch, throttled to at most one
  # fetch an hour: the gate step below skips the work when this workflow last
  # *fetched* (not counting throttled runs) under an hour ago — manual dispatch
  # always fetches. A commit is pushed only when the forecast content is
  # genuinely new. Skipped on forked PRs, whose read-only token can't push.
  fetch:
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read  # gate step lists this workflow's prior runs
    # Serialise data-branch writes across overlapping workflow runs.
    concurrency:
      group: data-collect
      cancel-in-progress: false
    steps:
      # Throttle gate: fetch only when this workflow last *fetched* over an hour
      # ago, so a burst of triggers (e.g. many pushes to a PR) fetches at most
      # once an hour. We walk prior runs newest-first and gate on the most recent
      # one whose fetch step actually ran — runs the gate itself skipped don't
      # count, so a long burst of skipped runs can't keep deferring the next
      # fetch. The run history is GitHub's own, so the gate needs no committed or
      # cached state. Manual dispatch always fetches.
      - name: Decide whether to fetch
        id: gate
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.info('Manual dispatch: fetching.');
              core.setOutput('fetch', 'true');
              return;
            }
            const HOUR = 60 * 60 * 1000;
            const now = Date.now();
            const FETCH_STEP = "Fetch the latest run if it isn't already archived";
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages.yml',
              per_page: 30,
            });
            const prior = data.workflow_runs
              .filter((r) => r.id !== context.runId && r.run_started_at &&
                Date.parse(r.run_started_at) < now)
              .sort((a, b) =>
                Date.parse(b.run_started_at) - Date.parse(a.run_started_at));
            let lastFetch = null;
            for (const run of prior) {
              const { data: jobsData } =
                await github.rest.actions.listJobsForWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id,
                });
              const job = jobsData.jobs.find((j) => j.name === 'fetch');
              const step = job && job.steps &&
                job.steps.find((s) => s.name === FETCH_STEP);
              // 'success'/'failure' = the fetch step ran; 'skipped' = throttled.
              if (step && (step.conclusion === 'success' ||
                           step.conclusion === 'failure')) {
                lastFetch = Date.parse(run.run_started_at);
                break;
              }
            }
            const should = !lastFetch || (now - lastFetch) >= HOUR;
            core.info(lastFetch
              ? `Last fetch started ${Math.round((now - lastFetch) / 60000)} min ago; fetch=${should}.`
              : 'No prior fetch found; fetch=true.');
            core.setOutput('fetch', should ? 'true' : 'false');

      - name: Checkout code
        if: steps.gate.outputs.fetch == 'true'
        uses: actions/checkout@v4

      - name: Checkout data branch
        if: steps.gate.outputs.fetch == 'true'
        uses: actions/checkout@v4
        with:
          ref: data
          path: data-store

      - name: Set up Python
        if: steps.gate.outputs.fetch == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.gate.outputs.fetch == 'true'
        run: pip install -r requirements.txt

      - name: Fetch the latest run if it isn't already archived
        if: steps.gate.outputs.fetch == 'true'
        run: |
          set -euo pipefail

          # collect.py downloads the ensemble and archives a forecast only when
          # its content is new, so a commit appears only when data changes.
          python data/collect.py --data-dir data-store

          cd data-store
          git add -A
          if git diff --cached --quiet; then
            echo "No new data; nothing to commit."
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -q -m "data: archive new raw forecast snapshots ($(date -u +%Y-%m-%dT%H:%MZ))"
          git push origin HEAD:data
          echo "Pushed new data to the data branch."

  # Build the static site from the latest archived data; both deploy jobs
  # consume the artifacts. No live fetching happens here.
  build:
    needs: fetch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Checkout data branch
        uses: actions/checkout@v4
        with:
          ref: data
          path: data-store

      - name: Build site
        run: python site/build.py --output-dir _site --data-dir data-store

      # Tarball in the format actions/deploy-pages expects (for GitHub Pages).
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # Plain copy of the files for the Cloudflare deploy.
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: _site

  # Publish to GitHub Pages on the production triggers: push to main, schedule,
  # and manual dispatch.
  deploy-pages:
    needs: build
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    # Only one Pages deployment at a time; let a running one finish.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Publish a per-PR branch (preview) deployment to Cloudflare Pages.
  deploy-cloudflare:
    needs: build
    # Secrets aren't exposed to forked-PR runs, so skip them to avoid a
    # guaranteed failure. Same-repo branch PRs deploy as normal.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    # Cancel superseded runs for the same PR so the latest push wins.
    concurrency:
      group: preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site

      - name: Deploy to Cloudflare Pages (branch deployment)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy _site
            --project-name=jhrmnn-weather
            --branch=${{ github.head_ref }}

      - name: Comment preview URL on the PR
        uses: actions/github-script@v7
        with:
          script: |
            // Prefer the stable per-branch alias; fall back to the per-deploy URL.
            const alias = "${{ steps.deploy.outputs.pages-deployment-alias-url }}";
            const deployment = "${{ steps.deploy.outputs.deployment-url }}";
            const primary = alias || deployment;
            if (!primary) return;
            const marker = "<!-- cloudflare-preview -->";
            let body = `${marker}\n🌥️ **Cloudflare Pages preview** for ` +
              `\`${{ github.head_ref }}\`:\n\n${primary}`;
            if (alias && deployment && alias !== deployment) {
              body += `\n\n<sub>This deploy: ${deployment}</sub>`;
            }
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
