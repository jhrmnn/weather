name: Deploy PR preview to Cloudflare Pages

on:
  pull_request:
    branches: [main]

# Cloudflare Pages derives a per-branch alias URL from the head branch, so each
# PR gets its own dedicated "branch deployment". Cancel superseded runs for the
# same PR so the latest push wins.
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  # Cloudflare Pages project name (Workers & Pages → your project → Settings).
  CLOUDFLARE_PROJECT_NAME: weather

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    # Secrets aren't exposed to forked-PR runs, so skip them to avoid a
    # guaranteed failure. Same-repo branch PRs deploy as normal.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: python site/build.py --output-dir _site

      - name: Deploy to Cloudflare Pages (branch deployment)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy _site
            --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }}
            --branch=${{ github.head_ref }}

      - name: Comment preview URL on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deploy.outputs.deployment-url }}";
            if (!url) return;
            const marker = "<!-- cloudflare-preview -->";
            const body = `${marker}\n🌥️ **Cloudflare Pages preview** for \`${{ github.head_ref }}\`:\n\n${url}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
